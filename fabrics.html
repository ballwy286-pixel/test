<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الأقمشة | 5AMAH BOUTIQUE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    .product-page-hero {
      min-height: 40vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--navy);
      text-align: center;
      padding-top: 80px;
      position: relative;
      overflow: hidden;
    }
    .product-page-hero::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0.03;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 80px, var(--coral) 80px, var(--coral) 81px),
        repeating-linear-gradient(90deg, transparent, transparent 80px, var(--coral) 80px, var(--coral) 81px);
    }
    .product-page-hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3rem);
      color: var(--white);
      letter-spacing: 0.08em;
      position: relative;
      z-index: 1;
    }
    .product-page-hero h1 span { color: var(--coral); }
    .product-page-hero p {
      color: var(--text-light);
      font-size: 1.1rem;
      margin-top: 0.8rem;
      font-weight: 300;
      position: relative;
      z-index: 1;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 1.5rem;
      padding: 0.7rem 1.8rem;
      border: 1.5px solid var(--coral);
      color: var(--coral);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      border-radius: 50px;
      transition: var(--transition);
      position: relative;
      z-index: 1;
    }
    .back-btn:hover {
      background: var(--coral);
      color: var(--white);
    }
    .products-showcase {
      background: var(--off-white);
    }
    .coming-soon {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-muted);
    }
    .coming-soon i {
      font-size: 3rem;
      color: var(--coral);
      opacity: 0.4;
      margin-bottom: 1rem;
    }
    .coming-soon h3 {
      font-size: 1.3rem;
      color: var(--navy);
      margin-bottom: 0.5rem;
    }
    .coming-soon p {
      font-size: 0.95rem;
    }
    .showcase-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
    }
    .showcase-card {
      background: var(--white);
      border-radius: 16px;
      overflow: hidden;
      transition: var(--transition);
      border: 1px solid rgba(10,22,40,0.04);
    }
    .showcase-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
    }
    .showcase-img {
      width: 100%;
      aspect-ratio: 1;
      background: linear-gradient(135deg, var(--navy), var(--navy-mid));
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .showcase-img i {
      font-size: 3rem;
      color: var(--coral);
      opacity: 0.6;
    }
    .showcase-info {
      padding: 1.5rem;
    }
    .showcase-info h3 {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
    }
    .showcase-info p {
      font-size: 0.88rem;
      color: #888;
      font-weight: 300;
      line-height: 1.7;
    }
    .product-price {
      display: inline-block;
      margin-top: 0.8rem;
      padding: 0.4rem 1rem;
      background: var(--navy);
      color: var(--coral);
      border-radius: 50px;
      font-size: 0.9rem;
      font-weight: 700;
    }
    .whatsapp-order-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.8rem;
      padding: 0.5rem 1.2rem;
      background: #25D366;
      color: #fff;
      border-radius: 50px;
      font-size: 0.85rem;
      font-weight: 600;
      text-decoration: none;
      transition: var(--transition);
      border: none;
      cursor: pointer;
      font-family: 'Tajawal', sans-serif;
    }
    .whatsapp-order-btn:hover {
      background: #128C7E;
      transform: scale(1.05);
    }
    .whatsapp-order-btn i {
      font-size: 1rem;
    }
    @media (max-width: 768px) {
      .showcase-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 480px) {
      .showcase-grid { grid-template-columns: 1fr; }
    }
    /* ===== MODAL ===== */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10,22,40,0.9);
      backdrop-filter: blur(8px);
      z-index: 2000;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      cursor: pointer;
    }
    .modal-overlay.active { display: flex; }
    .modal-content {
      width: 90vw;
      max-width: 600px;
      height: 80vh;
      max-height: 700px;
      cursor: default;
      animation: modalIn 0.3s ease;
      border-radius: 16px;
      overflow: hidden;
    }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
    .modal-img {
      width: 100%;
      height: 100%;
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      background-color: var(--white);
    }
    .modal-close {
      position: fixed;
      top: 1.5rem;
      left: 1.5rem;
      width: 44px;
      height: 44px;
      background: var(--white);
      border: none;
      border-radius: 50%;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
      color: var(--navy);
      z-index: 2001;
    }
    .modal-close:hover { background: var(--coral); color: var(--white); }
    .showcase-card { cursor: pointer; }
  </style>
</head>
<body>

  <nav class="navbar" id="navbar">
    <div class="container">
      <a href="index.html" class="nav-logo">
        <svg class="nav-logo-icon" viewBox="0 0 120 140" fill="none">
          <path d="M60 20 C35 20 22 38 22 55 C22 65 27 72 36 76 C27 80 22 88 22 96 C22 108 32 116 48 116 L60 116 L60 20Z" stroke="#e8848a" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          <line x1="60" y1="20" x2="60" y2="116" stroke="#e8848a" stroke-width="5" stroke-linecap="round"/>
          <line x1="60" y1="68" x2="98" y2="20" stroke="#e8848a" stroke-width="5" stroke-linecap="round"/>
          <line x1="60" y1="68" x2="98" y2="116" stroke="#e8848a" stroke-width="5" stroke-linecap="round"/>
        </svg>
        <span class="nav-logo-text">5AMAH</span>
      </a>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html#hero">الرئيسية</a></li>
        <li><a href="index.html#about">من نحن</a></li>
        <li><a href="index.html#products">منتجاتنا</a></li>
        <li><a href="index.html#vision">رؤيتنا</a></li>
        <li><a href="index.html#contact">تواصل معنا</a></li>
      </ul>
      <button class="nav-toggle" id="navToggle" aria-label="القائمة">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <section class="product-page-hero">
    <div>
      <h1>الأقمشة</h1>
      <p>مجموعة فاخرة من أرقى الأقمشة</p>
      <a href="index.html#products" class="back-btn">
        <i class="fas fa-arrow-right"></i>
        العودة للمنتجات
      </a>
    </div>
  </section>

  <section class="products-showcase section-padding">
    <div class="container">
      <div class="showcase-grid">
        <div class="showcase-card reveal visible">
          <div class="showcase-img" style="background: url('https://cdn.discordapp.com/attachments/1442961534505582615/1517289281071218870/image.png?ex=6a35bd42&is=6a346bc2&hm=96381b90419db05809aaf9060d11ad2c41bd168e3fb01ef0446abeefd7bf7655&') center/cover no-repeat;"></div>
          <div class="showcase-info">
            <h3>بريسم ديجتل</h3>
            <p>خام ناعم والوانه جميله ورويانه</p>
            <span class="product-price">١٢ ريال</span>
          </div>
        </div>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <div class="footer-logo">
        <svg viewBox="0 0 120 140" fill="none" width="28">
          <path d="M60 20 C35 20 22 38 22 55 C22 65 27 72 36 76 C27 80 22 88 22 96 C22 108 32 116 48 116 L60 116 L60 20Z" stroke="#e8848a" stroke-width="5" fill="none"/>
          <line x1="60" y1="20" x2="60" y2="116" stroke="#e8848a" stroke-width="5"/>
          <line x1="60" y1="68" x2="98" y2="20" stroke="#e8848a" stroke-width="5"/>
          <line x1="60" y1="68" x2="98" y2="116" stroke="#e8848a" stroke-width="5"/>
        </svg>
        <span>5AMAH BOUTIQUE</span>
      </div>
      <p>جميع الحقوق محفوظة &copy; 2025 - 5AMAH BOUTIQUE</p>
      <div class="footer-links">
        <a href="https://wa.me/96871596298" aria-label="واتساب" target="_blank"><i class="fab fa-whatsapp"></i></a>
        <a href="https://www.instagram.com/5amah_boutique?igsh=MTQ5ZjRmMXljNm4xbg==" aria-label="إنستغرام" target="_blank"><i class="fab fa-instagram"></i></a>
        <a href="https://snapchat.com/add/5amah_boutique" aria-label="سناب شات" target="_blank"><i class="fab fa-snapchat-ghost"></i></a>
        <a href="https://www.tiktok.com/@5amah_boutiq?_r=1&_t=ZS-97JqJIZwgdR" aria-label="تيك توك" target="_blank"><i class="fab fa-tiktok"></i></a>
      </div>
    </div>
  </footer>

  <!-- Modal -->
  <div class="modal-overlay" id="productModal">
    <button class="modal-close" id="modalClose"><i class="fas fa-times"></i></button>
    <div class="modal-content">
      <div class="modal-img" id="modalImg"></div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    const modal = document.getElementById('productModal');
    const modalImg = document.getElementById('modalImg');
    const modalClose = document.getElementById('modalClose');

    document.querySelectorAll('.showcase-card').forEach(card => {
      card.addEventListener('click', () => {
        const img = card.querySelector('.showcase-img');
        const bg = img.style.backgroundImage;
        modalImg.style.backgroundImage = bg;
        modal.classList.add('active');
        document.body.style.overflow = 'hidden';
      });

      // Add WhatsApp order button
      const info = card.querySelector('.showcase-info');
      const productName = card.querySelector('h3').textContent;
      const productPrice = card.querySelector('.product-price').textContent;
      const waBtn = document.createElement('a');
      const waMessage = encodeURIComponent(`السلام عليكم، أبي أطلب: ${productName} ${productPrice ? '- ' + productPrice : ''}`);
      waBtn.href = `https://wa.me/96871596298?text=${waMessage}`;
      waBtn.target = '_blank';
      waBtn.className = 'whatsapp-order-btn';
      waBtn.innerHTML = '<i class="fab fa-whatsapp"></i> اطلب عبر واتساب';
      waBtn.addEventListener('click', (e) => e.stopPropagation());
      info.appendChild(waBtn);
    });

    function closeModal() {
      modal.classList.remove('active');
      document.body.style.overflow = '';
    }
    modalClose.addEventListener('click', closeModal);
    modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });
  </script>
</body>
</html>
